name: Release

# Builds signed/notarized macOS (Apple Silicon + Intel), Linux, and Windows
# installers via tauri-action.
#
#   • Push a tag `vX.Y.Z`  -> builds all platforms and uploads them to a DRAFT
#                             GitHub Release named after the tag.
#   • Run manually (Actions -> Release -> Run workflow) -> builds all platforms
#                             and uploads the installers as workflow artifacts,
#                             without creating a release. Use this as a dry run.
#
# The embedding weights (~45 MB, gitignored) are fetched + quantized ONCE in the
# `prepare-model` job and shared to every build job as an artifact, so we don't
# hit Hugging Face / run Python four times.
#
# macOS signing is REQUIRED: the mac jobs read Developer ID + notarization
# credentials from repository secrets (see APPLE_* below). Missing secrets cause
# the mac build to fail at the signing/notarization step — by design.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Allow the workflow to create the release and upload assets.
permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Fetch + F16-quantize the active model once; share to build jobs as an
  # artifact. The weights are platform-independent, so this avoids re-running
  # the Python quantization on every (including Windows) runner.
  # ---------------------------------------------------------------------------
  prepare-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # numpy + safetensors power src-tauri/quantize-model.py (F32 -> F16).
      - name: Install quantization deps
        run: pip install numpy safetensors

      # Fetches from Hugging Face into src-tauri/models/mdbr-leaf-mt/ and
      # quantizes the BERT weights in place. Must match MODEL_NAME in lib.rs.
      - name: Fetch + quantize mdbr-leaf-mt
        run: bash src-tauri/fetch-model.sh mdbr-leaf-mt

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-mdbr-leaf-mt
          path: src-tauri/models/mdbr-leaf-mt
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build the app for each platform. macOS is built per-arch on its native
  # runner (no cross-compile of the Accelerate/Metal candle path).
  # ---------------------------------------------------------------------------
  build:
    needs: prepare-model
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal-apple-darwin DMG covering Intel + Apple Silicon, built
          # on the Apple Silicon runner. GitHub is retiring Intel (macos-13)
          # runners, so rather than a separate Intel job we fuse both arch slices
          # with lipo. `universal-apple-darwin` isn't a real rustup target, so
          # toolchain_targets installs the two real targets it's built from.
          - name: macOS (Universal)
            os: macos-14
            rust_target: universal-apple-darwin
            toolchain_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: "--target universal-apple-darwin"
          - name: Linux (x86_64)
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            toolchain_targets: x86_64-unknown-linux-gnu
            args: ""
          # Pinned to windows-2022 (stable VS 2022 / MSVC 14.4x) rather than
          # windows-latest: the latter rolled to a VS 18 *preview* MSVC
          # (14.51) that ICEs stable rustc while compiling semantra_lib
          # ("TryFromIntError" panic). v0.1.3 built fine on VS 2022, so we pin
          # the known-good toolchain instead of chasing the preview's bug.
          - name: Windows (x86_64)
            os: windows-2022
            rust_target: x86_64-pc-windows-msvc
            toolchain_targets: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Tauri's Linux runtime/build deps (webkit2gtk 4.1, GTK, appindicator,
      # rsvg) plus patchelf for AppImage. No-op on macOS/Windows.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            libssl-dev \
            libsoup-3.0-dev

      # The lance/datafusion stack runs `protoc` at build time to codegen its
      # protobuf types. Not preinstalled on the runners; this action installs it
      # cross-platform (macOS/Linux/Windows) and puts it on PATH.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.toolchain_targets }}

      # Cache the (large) Rust dependency build — datafusion/lance/candle dominate
      # compile time. Scoped to the src-tauri crate.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Restore the shared, pre-quantized weights so the bundle resource
      # (models/mdbr-leaf-mt/**) is present at build time.
      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-mdbr-leaf-mt
          path: src-tauri/models/mdbr-leaf-mt

      # Notarization requires EVERY Mach-O in the bundle to be Developer-ID-signed
      # with a secure timestamp. Tauri signs the main binary + the .app, but the
      # bundled libpdfium.dylib (a loose dylib under Resources/) is left unsigned,
      # so the notary rejects the whole archive. Fix: fetch + sign the dylib here
      # and drop it where build.rs caches it (build.rs skips the download when the
      # file already exists), so the bundle picks up the signed copy. macOS only.
      - name: Pre-sign bundled libpdfium (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          # Keep this tag in sync with PDFIUM_RELEASE in src-tauri/build.rs.
          PDFIUM_TAG="chromium%2F7881"
          BASE="https://github.com/bblanchon/pdfium-binaries/releases/download/${PDFIUM_TAG}"
          mkdir -p src-tauri/libpdfium
          # For the universal build, fetch BOTH arch dylibs and lipo them into one
          # fat dylib so the single bundled resource is valid for both slices.
          # build.rs runs per-arch but skips the download when this file exists,
          # so both arch builds pick up the signed universal dylib.
          fetch() { # $1 = archive, $2 = dest dir
            curl -fSL --retry 3 -o "$RUNNER_TEMP/$1" "$BASE/$1"
            mkdir -p "$RUNNER_TEMP/$2"
            tar xzf "$RUNNER_TEMP/$1" -C "$RUNNER_TEMP/$2" lib/libpdfium.dylib
          }
          case "${{ matrix.rust_target }}" in
            aarch64-apple-darwin)
              fetch pdfium-mac-arm64.tgz arm
              cp "$RUNNER_TEMP/arm/lib/libpdfium.dylib" src-tauri/libpdfium/libpdfium.dylib ;;
            x86_64-apple-darwin)
              fetch pdfium-mac-x64.tgz x64
              cp "$RUNNER_TEMP/x64/lib/libpdfium.dylib" src-tauri/libpdfium/libpdfium.dylib ;;
            universal-apple-darwin)
              fetch pdfium-mac-arm64.tgz arm
              fetch pdfium-mac-x64.tgz x64
              lipo -create \
                "$RUNNER_TEMP/arm/lib/libpdfium.dylib" \
                "$RUNNER_TEMP/x64/lib/libpdfium.dylib" \
                -output src-tauri/libpdfium/libpdfium.dylib
              echo "--- fat libpdfium archs ---"; lipo -archs src-tauri/libpdfium/libpdfium.dylib ;;
            *) echo "unexpected target ${{ matrix.rust_target }}"; exit 1 ;;
          esac

          # Import the Developer ID cert into a dedicated keychain so codesign can
          # find the identity (tauri-action's own keychain isn't set up yet).
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/libpdfium-signing.keychain-db"
          KCPW="$(openssl rand -base64 24)"
          security create-keychain -p "$KCPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KCPW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          codesign --force --timestamp --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" src-tauri/libpdfium/libpdfium.dylib
          echo "--- libpdfium signature ---"
          codesign -dvv src-tauri/libpdfium/libpdfium.dylib 2>&1 \
            | grep -iE "Authority|Timestamp|Signature|Runtime" || true
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build and bundle
        uses: tauri-apps/tauri-action@v0
        env:
          # Required by tauri-action to create the GitHub Release and upload
          # assets on tag builds (the workflow grants `contents: write`).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- macOS code signing (Developer ID) ---
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # --- macOS notarization ---
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Create a draft release only when triggered by a version tag.
          # On manual (workflow_dispatch) runs tagName is empty -> no release;
          # installers are uploaded as workflow artifacts in the next step.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Semantra {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Dry-run convenience: when not building a release, surface the installers
      # as downloadable workflow artifacts so they can be inspected/tested. The
      # two globs cover both bundle layouts: `target/<triple>/release/bundle`
      # when `--target` is passed (macOS) and `target/release/bundle` otherwise
      # (Linux/Windows). Only one exists per job; the other is silently empty.
      - name: Upload installers (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.rust_target }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*
            src-tauri/target/release/bundle/**/*
          retention-days: 7
          if-no-files-found: warn
